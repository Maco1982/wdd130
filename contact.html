    <main>

        <section class="Information">
            <h1>Contact Us</h1>

            <h2>Xtreme Rafting Guatemala</h2>

            <p><strong>Address:</strong> 1ra av 8-15 zone 1, Guatemala City</p>

            <p><strong>Phone:</strong> +502 37713675</p>

            <p><strong>Email:</strong>xtremeraftingguatemala@gmail.com</p>

            
        </section>
     
        <section class="contact-grid">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2729.6120680502504!2d-90.51409056822662!3d14.64149486594537!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sgt!4v1781015436027!5m2!1ses!2sgt" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div> 
        
        <div class="contact-form">
              <form action="#" method="post">
                <div class="form-item">   
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
              </div>     

            <div class="form-item">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <fieldset> 
                <legend> Message purpose </legend> 
            
                <label for ="general">
                    <input type="radio" id="general" name="purpose" value="general" checked>
                    General Inquiry
                </label>    

                <label for="reservation">
                <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website suggestion
                </label>
                </fieldset>        

                <div class="form-item message"> 
                    <label for="message">Message</label>
                    <textarea id="message" 
                    name= "message"
                    rows="8"></textarea>
                </div>
            
                <div class="checkbox">
                    <label>
                        <input type="checkbox" name="newsletter">
                        Stay in the loope with all our future projects.
                    </label>

                </div>

                <button type="submit">Send Message</button>
            </form>

        </div>
    </main>


        <section class="employee">
            <h2> Our team</h2>

            <div class="employee-grid">

        <figure>
            <img src="/images/profile.jpg" alt="Guide">

        </figure>


        <figure>
            <img src="/images/profile.jpg" alt="Pilot">

        </figure>

        <figure>

            <figcaption>Marcos Garcia <br> Instructor </figcaption>
        </figure>

        </section>
